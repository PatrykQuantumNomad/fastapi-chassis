{{- if .Values.migrations.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "fastapi-chassis.fullname" . }}-migrate
  namespace: {{ include "fastapi-chassis.namespace" . }}
  labels:
    {{- include "fastapi-chassis.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-1"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit | default 3 }}
  activeDeadlineSeconds: {{ .Values.migrations.activeDeadlineSeconds | default 120 }}
  template:
    metadata:
      labels:
        {{- include "fastapi-chassis.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "fastapi-chassis.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "fastapi-chassis.serviceAccountName" . }}
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: {{ include "fastapi-chassis.image" (dict "imageRoot" .Values.image "global" (.Values.global | default dict) "defaultTag" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: {{ include "fastapi-chassis.fullname" . }}
            {{- if .Values.secret.create }}
            - secretRef:
                name: {{ include "fastapi-chassis.fullname" . }}
            {{- end }}
            {{- if .Values.existingSecret }}
            - secretRef:
                name: {{ .Values.existingSecret }}
            {{- end }}
          {{- if and (eq (.Values.database.backend | default "postgres") "postgres") .Values.database.postgres.existingSecret }}
          env:
            - name: APP_DATABASE_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.postgres.existingSecret }}
                  key: {{ .Values.database.postgres.existingSecretPasswordKey | default "APP_DATABASE_POSTGRES_PASSWORD" }}
          {{- end }}
          {{- if and (eq (.Values.database.backend | default "postgres") "custom") .Values.database.existingSecret }}
          env:
            - name: APP_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretUrlKey | default "APP_DATABASE_URL" }}
            - name: APP_ALEMBIC_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretAlembicUrlKey | default "APP_ALEMBIC_DATABASE_URL" }}
                  optional: true
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if eq (.Values.database.backend | default "postgres") "sqlite" }}
            - name: data
              mountPath: /app/data
            {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 32Mi
        {{- if eq (.Values.database.backend | default "postgres") "sqlite" }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "fastapi-chassis.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
{{- end }}
