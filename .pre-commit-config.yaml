repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-format
        name: ruff format check
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: mypy
        name: mypy
        entry: uv run mypy src tests
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: bandit
        name: bandit security check
        entry: uv run bandit -r src -c pyproject.toml -q
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-unit
        name: pytest unit
        entry: uv run pytest -m unit
        language: system
        pass_filenames: false
        stages: [pre-push]
